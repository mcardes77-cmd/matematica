<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Editor de Perguntas</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-900 text-slate-50 min-h-screen'><div class='max-w-7xl mx-auto px-6 py-8'><div class='flex items-center justify-between mb-6'><div><h1 class='text-4xl font-bold'>Editor de Perguntas</h1><p class='text-slate-300'>Cadastre, exclua e gere perguntas com IA.</p></div><a href='/' class='bg-cyan-500 hover:bg-cyan-600 text-slate-950 px-4 py-3 rounded-xl font-bold'>Voltar</a></div><div class='grid xl:grid-cols-[0.8fr_1.2fr] gap-6'><section class='bg-slate-800 rounded-3xl shadow-2xl p-6 border border-slate-700'><div class='space-y-4'><div><label class='block mb-2 font-semibold'>Tema</label><select id='tema' onchange='carregarPerguntas()' class='w-full rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'>{% for id, nome in jogos.items() %}<option value='{{ id }}'>{{ id }} - {{ nome }}</option>{% endfor %}</select></div><div><label class='block mb-2 font-semibold'>Dificuldade</label><select id='dificuldade' class='w-full rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'><option value='facil'>Fácil</option><option value='medio' selected>Médio</option><option value='dificil'>Difícil</option></select></div><div><label class='block mb-2 font-semibold'>Enunciado</label><textarea id='enunciado' class='w-full rounded-xl bg-slate-900 border border-slate-600 p-3 text-white min-h-[110px]'></textarea></div><div class='grid grid-cols-1 gap-3'><input id='alt1' placeholder='Alternativa 1' class='rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'><input id='alt2' placeholder='Alternativa 2' class='rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'><input id='alt3' placeholder='Alternativa 3' class='rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'><input id='alt4' placeholder='Alternativa 4' class='rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'><input id='correta' placeholder='Resposta correta' class='rounded-xl bg-slate-900 border border-slate-600 p-3 text-white'></div><div class='flex gap-3 flex-wrap'><button onclick='salvarPergunta()' class='bg-emerald-500 hover:bg-emerald-600 text-slate-950 px-4 py-3 rounded-xl font-bold'>Salvar pergunta</button><button onclick='gerarIA()' class='bg-violet-500 hover:bg-violet-600 text-white px-4 py-3 rounded-xl font-bold'>Gerar com IA</button></div><div class='text-sm text-slate-400'>Para a IA funcionar, configure a variável de ambiente <strong>OPENAI_API_KEY</strong>.</div></div></section><section class='bg-slate-800 rounded-3xl shadow-2xl p-6 border border-slate-700'><div class='flex items-center justify-between mb-4'><h2 class='text-2xl font-bold'>Perguntas do tema</h2><div id='contador' class='text-slate-300'></div></div><div id='listaPerguntas' class='space-y-3 max-h-[70vh] overflow-y-auto'></div></section></div><footer class='text-center text-slate-400 text-sm mt-6'>Desenvolvido e registrado por Marcelo André Nogueira Cardes</footer></div><script>function valor(id){return document.getElementById(id).value.trim();}async function carregarPerguntas(){const tema=valor('tema');const res=await fetch(`/api/questions/${tema}`);const dados=await res.json();document.getElementById('contador').textContent=`${dados.length} pergunta(s)`;const box=document.getElementById('listaPerguntas');box.innerHTML=dados.map((q,idx)=>`<div class="bg-slate-900 border border-slate-700 rounded-2xl p-4"><div class="text-xs uppercase tracking-widest text-violet-400 mb-2">${q.dificuldade}</div><div class="font-semibold mb-2">${q.enunciado}</div><div class="grid md:grid-cols-2 gap-2 text-slate-300 text-sm mb-3">${q.alternativas.map(a=>`<div>• ${a}</div>`).join('')}</div><div class="text-emerald-400 font-bold mb-3">Correta: ${q.correta}</div><button onclick="excluirPergunta(${idx})" class="bg-rose-500 hover:bg-rose-600 text-white px-3 py-2 rounded-xl font-bold">Excluir</button></div>`).join('');}async function salvarPergunta(){const tema=valor('tema');const payload={dificuldade:valor('dificuldade'),enunciado:valor('enunciado'),alternativas:[valor('alt1'),valor('alt2'),valor('alt3'),valor('alt4')],correta:valor('correta')};if(!payload.enunciado||payload.alternativas.some(x=>!x)||!payload.correta){alert('Preencha enunciado, 4 alternativas e a correta.');return;}await fetch(`/api/questions/${tema}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});document.getElementById('enunciado').value='';document.getElementById('alt1').value='';document.getElementById('alt2').value='';document.getElementById('alt3').value='';document.getElementById('alt4').value='';document.getElementById('correta').value='';await carregarPerguntas();}async function excluirPergunta(idx){const tema=valor('tema');if(!confirm('Deseja excluir esta pergunta?'))return;await fetch(`/api/questions/${tema}/${idx}`,{method:'DELETE'});await carregarPerguntas();}async function gerarIA(){const tema=valor('tema');const dificuldade=valor('dificuldade');const res=await fetch(`/api/gerar_ia/${tema}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dificuldade})});const dados=await res.json();if(!res.ok){alert(dados.erro||'Erro ao gerar pergunta com IA.');return;}document.getElementById('enunciado').value=dados.enunciado||'';document.getElementById('alt1').value=(dados.alternativas||[])[0]||'';document.getElementById('alt2').value=(dados.alternativas||[])[1]||'';document.getElementById('alt3').value=(dados.alternativas||[])[2]||'';document.getElementById('alt4').value=(dados.alternativas||[])[3]||'';document.getElementById('correta').value=dados.correta||'';}carregarPerguntas();</script></body></html>
